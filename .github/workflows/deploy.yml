name: Deploy to S3/CloudFront on Merge to Main

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate production environment config
        run: |
          cat > src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            cognito: {
              userPoolId: '${{ secrets.COGNITO_USER_POOL_ID }}',
              userPoolClientId: '${{ secrets.COGNITO_USER_POOL_CLIENT_ID }}',
              domain: '${{ secrets.COGNITO_DOMAIN }}',
              redirectSignIn: '${{ secrets.CLOUDFRONT_DOMAIN }}/',
              redirectSignOut: '${{ secrets.CLOUDFRONT_DOMAIN }}/',
            },
          };
          EOF
          cp src/environments/environment.prod.ts src/environments/environment.ts

      - name: Build
        run: npx ionic build --prod

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync www/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
